services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: let-frontend
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      CHOKIDAR_USEPOLLING: true
      REACT_APP_API_URL: http://localhost:8081
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true
